name: Daily README Update

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Codex CLI
        run: npm install -g @openai/codex-cli

      - name: Run Codex to update README
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          codex --full-auto "Update README.md by replacing the line starting with 'Last Update:' with today's date."

      - name: Commit changes
        run: |
          git config user.name "codex-bot"
          git config user.email "[email protected]"
          git add README.md
          git diff --staged --quiet || git commit -m "Daily README update"
          git push
